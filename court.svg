<?xml version="1.0" encoding="UTF-8"?>
<!--
  Half-court shuffleboard diagram.
  234" × 72" (19.5 ft × 6 ft) — exactly half the 39 ft × 6 ft playing surface.
  1 unit = 1 inch.

  Vertical orientation: back baseline at y=0 (top), midline at y=234 (bottom).
  Centerline at x=36.

  See docs/RULES.md for the coordinate system, zone math, and rules.

  Key y-values:
    y=0    back baseline
    y=18   kitchen / 7 boundary (back base of scoring triangle)
    y=54   7 / 8 boundary
    y=90   8 / 10 boundary
    y=126  apex of the 10
    y=162  lag line (3 ft past apex)
    y=234  midline of full court

  Triangle outer edges: (0, 18) → (36, 126) and (72, 18) → (36, 126).
  Edge equation: x = (y − 18) / 3 (left) and x = 72 − (y − 18) / 3 (right),
  for y ∈ [18, 126].

  Consumers style fills, strokes, and stroke-width via CSS. The SVG carries
  geometry only.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 72 234"
  preserveAspectRatio="xMidYMin meet"
>
  <!-- Default styling. Override via CSS by targeting the IDs below. -->
  <style>
    #court            { fill: #e8e4d8; stroke: none; }
    #scoring-zones *  { fill: none; }
    #markings *       { fill: none; stroke: #2a2a2a; stroke-width: 1; stroke-linecap: square; }
    #kitchen-separator { fill: #2a2a2a; stroke: none; }
  </style>

  <!-- Background surface (fill only, no border) -->
  <rect id="court" x="0" y="0" width="72" height="234" />

  <!-- Scoring zones (independently fillable) -->
  <g id="scoring-zones">
    <!-- Kitchen / 10-off. Skewed sides matching the triangle slope: top edge full
         width at y=0, bottom edge narrower at y=18 (same slope as the scoring
         triangle edges). -->
    <polygon id="zone-kitchen" points="0,0 72,0 66,18 6,18" />

    <!-- 7 zone, left and right halves (y ∈ [18, 54]) -->
    <polygon id="zone-7-left"  points="0,18 36,18 36,54 12,54" />
    <polygon id="zone-7-right" points="36,18 72,18 60,54 36,54" />

    <!-- 8 zone, left and right halves (y ∈ [54, 90]) -->
    <polygon id="zone-8-left"  points="12,54 36,54 36,90 24,90" />
    <polygon id="zone-8-right" points="36,54 60,54 48,90 36,90" />

    <!-- 10 zone (single zone, no left/right split) (y ∈ [90, 126]) -->
    <polygon id="zone-10" points="24,90 48,90 36,126" />
  </g>

  <!-- Court markings (painted lines, 1" wide in real-world spec) -->
  <g id="markings">
    <!-- Kitchen side edges (skewed inward, matching the scoring triangle slope) -->
    <line id="kitchen-side-left"  x1="0"  y1="0" x2="6"  y2="18" />
    <line id="kitchen-side-right" x1="72" y1="0" x2="66" y2="18" />

    <!-- Back baseline -->
    <line id="line-baseline" x1="0" y1="0" x2="72" y2="0" />

    <!-- Kitchen / 7 boundary (back base of scoring triangle) -->
    <line id="line-kitchen-7" x1="0" y1="18" x2="72" y2="18" />

    <!-- Scoring triangle outer edges -->
    <line id="edge-left"  x1="0"  y1="18" x2="36" y2="126" />
    <line id="edge-right" x1="72" y1="18" x2="36" y2="126" />

    <!-- 7 / 8 separator (only spans the triangle width at y=54) -->
    <line id="line-7-8" x1="12" y1="54" x2="60" y2="54" />

    <!-- 8 / 10 separator (only spans the triangle width at y=90) -->
    <line id="line-8-10" x1="24" y1="90" x2="48" y2="90" />

    <!-- Centerline: per ILSA / old SVG, only through 7 and 8 zones -->
    <line id="centerline" x1="36" y1="18" x2="36" y2="90" />

    <!-- Lag line: 3 ft past apex (y=126 + 36 = 162). Discs short of this are dead. -->
    <line id="line-lag" x1="0" y1="162" x2="72" y2="162" />

    <!-- Kitchen separator triangle (decorative; per rule 1.3.1.4 not a scoring line).
         Approximate dimensions from old SVG; confirm with reference court if needed. -->
    <polygon id="kitchen-separator" points="34,0 38,0 36,17" />
  </g>
</svg>
